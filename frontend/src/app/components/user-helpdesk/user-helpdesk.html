<section class="flex min-h-[calc(100vh-4rem)] items-center justify-center bg-gray-50 px-4 py-10">
  <div class="w-full max-w-3xl rounded-lg border border-gray-200 bg-white p-8 text-center shadow-sm">
    <h1 class="text-3xl font-semibold tracking-tight text-gray-900">
      Hello! How can I help you today?
    </h1>

    <div class="mt-8 text-left">
      <label for="userInput" class="mb-2 block text-sm font-medium text-gray-700">
        Describe your IT issue
      </label>
      <textarea
        id="userInput"
        name="userInput"
        rows="8"
        [(ngModel)]="userInput"
        class="block w-full resize-none rounded-md border border-gray-300 bg-white px-4 py-3 text-base text-gray-900 shadow-sm outline-none transition placeholder:text-gray-400 focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20"
        placeholder="Example: I cannot connect to VPN and internal tools are unavailable."
      ></textarea>
    </div>

    <div class="mt-6 flex justify-center">
      <button
        type="button"
        (click)="openModal()"
        class="rounded-md bg-blue-600 px-6 py-3 text-sm font-semibold text-white shadow-sm transition hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2"
      >
        Ask AI Support
      </button>
    </div>
  </div>
</section>

<div
  *ngIf="isModalOpen"
  class="fixed inset-0 z-[100] flex items-center justify-center bg-black/50 px-4 py-6"
  role="dialog"
  aria-modal="true"
  aria-labelledby="aiTicketAnalysisTitle"
>
  <section class="w-full max-w-2xl rounded-lg bg-white shadow-xl">
    <header class="border-b border-gray-200 px-6 py-5">
      <h2 id="aiTicketAnalysisTitle" class="text-xl font-semibold text-gray-900">
        AI Ticket Analysis
      </h2>
    </header>

    <div class="space-y-6 px-6 py-5">
      <div class="flex flex-wrap gap-3">
        <span class="rounded-full bg-blue-50 px-3 py-1 text-sm font-medium text-blue-700">
          Category: Network
        </span>
        <span class="rounded-full bg-red-50 px-3 py-1 text-sm font-medium text-red-700">
          Priority: High
        </span>
        <span class="rounded-full bg-orange-50 px-3 py-1 text-sm font-medium text-orange-700">
          Label: Urgent
        </span>
      </div>

      <div>
        <label for="cleanedDescription" class="mb-2 block text-sm font-medium text-gray-700">
          Clean Description
        </label>
        <textarea
          id="cleanedDescription"
          name="cleanedDescription"
          rows="7"
          [(ngModel)]="cleanedDescription"
          class="block w-full resize-y rounded-md border border-gray-300 bg-white px-4 py-3 text-sm text-gray-900 shadow-sm outline-none transition focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20"
        ></textarea>
      </div>
    </div>

    <footer class="flex justify-end gap-3 border-t border-gray-200 bg-gray-50 px-6 py-4">
      <button
        type="button"
        (click)="closeModal()"
        class="rounded-md border border-gray-300 bg-white px-4 py-2 text-sm font-medium text-gray-700 shadow-sm transition hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2"
      >
        Cancel
      </button>
      <button
        type="button"
        (click)="submitTicket()"
        class="rounded-md bg-green-600 px-4 py-2 text-sm font-semibold text-white shadow-sm transition hover:bg-green-700 focus:outline-none focus:ring-2 focus:ring-green-500 focus:ring-offset-2"
      >
        Submit
      </button>
    </footer>
  </section>
</div>
