<section class="flex min-h-[calc(100vh-4rem)] items-center justify-center px-6 py-12">
  <div class="w-full max-w-4xl bg-white rounded-xl shadow-[0_8px_30px_rgb(0,0,0,0.04)] border border-slate-100 p-8">
    <div class="mb-8 flex flex-col gap-4 lg:flex-row lg:items-start lg:justify-between">
      <div>
        <p class="text-sm font-medium text-indigo-600">AI Validation</p>
        <h1 class="mt-2 text-3xl font-semibold text-slate-800">
          Review the AI ticket analysis.
        </h1>
        <p class="mt-3 max-w-2xl text-slate-500">
          Confirm the category and edit the cleaned description before sending it to IT support.
        </p>
      </div>

      <div class="rounded-xl bg-indigo-50/50 px-5 py-4 text-indigo-900">
        <p class="text-xs font-medium uppercase tracking-wide text-indigo-600">Category</p>
        <p class="mt-1 text-lg font-semibold">{{ triageResult.category }}</p>
      </div>
    </div>

    <div>
      <label for="cleanDescription" class="mb-2 block text-sm font-medium text-slate-800">
        Cleaned description
      </label>
      <textarea
        id="cleanDescription"
        name="cleanDescription"
        rows="8"
        [(ngModel)]="triageResult.cleanDescription"
        class="w-full resize-y bg-slate-50 border border-slate-200 rounded-lg px-4 py-3 text-sm text-slate-800 outline-none focus:bg-white focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 transition-all"
      ></textarea>
    </div>

    <div class="mt-6 rounded-xl border border-slate-100 bg-slate-50 p-5">
      <p class="text-sm font-medium text-slate-800">AI explanation</p>
      <p class="mt-2 text-sm leading-6 text-slate-500">{{ triageResult.explanation }}</p>
    </div>

    <p *ngIf="errorMessage" class="mt-6 rounded-lg bg-rose-50 px-4 py-3 text-sm font-medium text-rose-700">
      {{ errorMessage }}
    </p>

    <div class="mt-8 flex flex-col-reverse gap-3 sm:flex-row sm:justify-end">
      <button
        type="button"
        (click)="cancel()"
        class="px-4 py-2 rounded-lg font-medium transition-all shadow-sm bg-slate-100 text-slate-700 hover:bg-slate-200 focus:outline-none focus:ring-2 focus:ring-slate-400/30"
      >
        Cancel
      </button>
      <button
        type="button"
        (click)="confirmTicket()"
        [disabled]="isConfirming"
        class="px-4 py-2 rounded-lg font-medium transition-all shadow-sm bg-emerald-600 text-white hover:bg-emerald-700 focus:outline-none focus:ring-2 focus:ring-emerald-500/30 disabled:cursor-not-allowed disabled:bg-emerald-300"
      >
        {{ isConfirming ? 'Submitting...' : 'Confirm & Submit' }}
      </button>
    </div>
  </div>
</section>
