<section class="flex min-h-[calc(100vh-4rem)] items-center justify-center px-6 py-12">
  <div class="w-full max-w-3xl bg-white rounded-xl shadow-[0_8px_30px_rgb(0,0,0,0.04)] border border-slate-100 p-8">
    <div class="mb-8">
      <p class="text-sm font-medium text-indigo-600">TriageLens Helpdesk</p>
      <h1 class="mt-2 text-3xl font-semibold text-slate-800">
        Tell us what is going wrong.
      </h1>
      <p class="mt-3 text-slate-500">
        Describe your IT issue in plain language. The AI triage assistant will clean it up and suggest a category, label, and priority.
      </p>
    </div>

    <form class="space-y-6" (ngSubmit)="submitTicket()">
      <div>
        <label for="ticketDescription" class="mb-2 block text-sm font-medium text-slate-800">
          Issue description
        </label>
        <textarea
          id="ticketDescription"
          name="ticketDescription"
          rows="9"
          [(ngModel)]="ticketDescription"
          [disabled]="isSubmitting"
          class="w-full resize-none bg-slate-50 border border-slate-200 rounded-lg px-4 py-3 text-sm text-slate-800 outline-none focus:bg-white focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 transition-all disabled:cursor-not-allowed disabled:opacity-70"
          placeholder="Example: I cannot connect to VPN and cannot access internal applications."
        ></textarea>
      </div>

      <p *ngIf="errorMessage" class="rounded-lg bg-rose-50 px-4 py-3 text-sm font-medium text-rose-700">
        {{ errorMessage }}
      </p>

      <div class="flex items-center justify-end gap-3">
        <button
          type="submit"
          [disabled]="isSubmitting || !ticketDescription.trim()"
          class="px-4 py-2 rounded-lg font-medium transition-all shadow-sm bg-indigo-600 text-white hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-indigo-500/30 disabled:cursor-not-allowed disabled:bg-indigo-300"
        >
          {{ isSubmitting ? 'Analyzing...' : 'Submit for AI Triage' }}
        </button>
      </div>
    </form>
  </div>
</section>
